---
layout: layout.html
---

<div class="page-for-blog">
  <img src="{{ banner }}" class="post-banner">
  <article class="post">
    <h1 class="post-title">#{{ index }}. {{ title }}</h1>
    <div class="post-info">
      <div class="post-info-item">
        <span><img src="/images/svg/tags.svg" class="icon-small"></span>
        <span>Tags:</span>
        {% for tag in tags %}{% if tag != "posts" %}<span class="tag">{{ tag }}</span>{% endif %}{% endfor %}
      </div>
      <div class="post-info-item">
        <span><img src="/images/svg/time.svg" class="icon-small"></span>
        <span>Date Published: {{ date | date: "%Y-%m-%d" }}</span>
      </div>
    </div>
    {{ content }}
  </article>
</div>
